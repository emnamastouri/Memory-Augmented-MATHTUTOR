# Copy this file to .streamlit/secrets.toml for local execution.
# Never commit the real secrets.toml file.

[openrouter]
# For better validation quality, you can use a stronger model for judge_model than exercise_model.
api_key = "your-openrouter-api-key"
base_url = "https://openrouter.ai/api/v1"
exercise_model_primary = "qwen/qwen-2.5-7b-instruct"
exercise_model_fallback = "qwen/qwen-2.5-7b-instruct"
judge_model = "qwen/qwen-2.5-7b-instruct"
validator_model = "qwen/qwen-2.5-7b-instruct"
tutor_model = "qwen/qwen-2.5-7b-instruct"
openrouter_response_mode = "auto" # auto | json_schema | json_object | prompt_only
site_url = "http://localhost:8501"
app_name = "MathTutorAI"
allow_dataset_demo = false

[mongo]
uri = "mongodb://localhost:27017"
db_name = "mathtutorai"
